<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>

    <meta name="theme-color" content="#005986 " />

    <meta
      name="description"
      content="Stay updated with real-time weather
    forecasts and conditions. Our user-friendly weather website provides
    accurate data powered by reliable APIs, helping you plan your day with
    confidence. Explore current temperatures, forecasts, and more!"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="titleContainer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
          <!--!Font Awesome Free 6.6.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.-->
          <path
            d="M294.2 1.2c5.1 2.1 8.7 6.7 9.6 12.1l10.4 62.4c-23.3 10.8-42.9 28.4-56 50.3c-14.6-9-31.8-14.1-50.2-14.1c-53 0-96 43-96 96c0 35.5 19.3 66.6 48 83.2c.8 31.8 13.2 60.7 33.1 82.7l-56 39.2c-4.5 3.2-10.3 3.8-15.4 1.6s-8.7-6.7-9.6-12.1L98.1 317.9 13.4 303.8c-5.4-.9-10-4.5-12.1-9.6s-1.5-10.9 1.6-15.4L52.5 208 2.9 137.2c-3.2-4.5-3.8-10.3-1.6-15.4s6.7-8.7 12.1-9.6L98.1 98.1l14.1-84.7c.9-5.4 4.5-10 9.6-12.1s10.9-1.5 15.4 1.6L208 52.5 278.8 2.9c4.5-3.2 10.3-3.8 15.4-1.6zM208 144c13.8 0 26.7 4.4 37.1 11.9c-1.2 4.1-2.2 8.3-3 12.6c-37.9 14.6-67.2 46.6-77.8 86.4C151.8 243.1 144 226.5 144 208c0-35.3 28.7-64 64-64zm69.4 276c11 7.4 14 22.3 6.7 33.3l-32 48c-7.4 11-22.3 14-33.3 6.7s-14-22.3-6.7-33.3l32-48c7.4-11 22.3-14 33.3-6.7zm96 0c11 7.4 14 22.3 6.7 33.3l-32 48c-7.4 11-22.3 14-33.3 6.7s-14-22.3-6.7-33.3l32-48c7.4-11 22.3-14 33.3-6.7zm96 0c11 7.4 14 22.3 6.7 33.3l-32 48c-7.4 11-22.3 14-33.3 6.7s-14-22.3-6.7-33.3l32-48c7.4-11 22.3-14 33.3-6.7zm96 0c11 7.4 14 22.3 6.7 33.3l-32 48c-7.4 11-22.3 14-33.3 6.7s-14-22.3-6.7-33.3l32-48c7.4-11 22.3-14 33.3-6.7zm74.5-116.1c0 44.2-35.8 80-80 80l-271.9 0c-53 0-96-43-96-96c0-47.6 34.6-87 80-94.6l0-1.3c0-53 43-96 96-96c34.9 0 65.4 18.6 82.2 46.4c13-9.1 28.8-14.4 45.8-14.4c44.2 0 80 35.8 80 80c0 5.9-.6 11.7-1.9 17.2c37.4 6.7 65.8 39.4 65.8 78.7z"
          />
        </svg>
        <span>Weather</span>
      </div>
    </header>
    <main>
      <section>
        <div class="weatherContainer">
          <div class="searchContainer">
            <input
              list="popularCities"
              type="text"
              name=""
              id="seachInput"
              placeholder="Search City"
            />
            <datalist id="popularCities">
              <!-- Options Here -->
            </datalist>
            <div class="searchIcon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <!--!Font Awesome Free 6.6.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.-->
                <path
                  d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"
                />
              </svg>
            </div>
          </div>
          <div class="errorMsg">
            <!-- Error Message Here -->
          </div>
          <div class="resultContainer">
            <div class="tempContainer">
              <div class="tempCntHeading">
                Weather today in <span class="cityName"></span>
                <span class="countryImageClass">
                  <img src="" alt="Searched City's country image" />
                </span>
              </div>
              <div class="tempAndDis">
                <div class="degree">00&deg</div>
                <div class="description"></div>
              </div>
              <div class="tempIcon">
                <img
                  src="https://openweathermap.org/img/wn/03n.png"
                  alt="Weather Condition Image in SVG format"
                />
              </div>
              <div class="sunriseSunset">
                <div class="sunrise">
                  <p>Sunrise <img src="assets/sunriseIcon.png" alt="" /></p>
                  <span>00:00 AM</span>
                </div>
                <div class="sunset">
                  <p>Sunset <img src="assets/sunsetIcon.png" alt="" /></p>
                  <span>00:00 PM</span>
                </div>
              </div>
              <div class="extraInfo">
                <div class="windCnt">
                  <p>Wind</p>
                  <span>0.0km/h</span>
                </div>
                <div class="humidityCnt">
                  <p>humidity</p>
                  <span>0%</span>
                </div>
                <div class="minTemp">
                  <p>Minimum Temperature</p>
                  <span>00&deg</span>
                </div>
                <div class="maxTemp">
                  <p>Maximum Temperature</p>
                  <span>00&deg</span>
                </div>
                <div class="seaLevel">
                  <p>Sea Level</p>
                  <span>000Hpa</span>
                </div>
                <div class="groundLevel">
                  <p>Ground Level</p>
                  <span>000Hpa</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="cities.js"></script>
  <script src="script.js"></script>
</html>
